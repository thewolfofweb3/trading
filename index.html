<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crypto Research Lab</title>
    <link rel="stylesheet" href="./crypto-quant-workspace.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Crypto trading research workspace">
      <aside class="workspace-rail">
        <header class="rail-header">WORKSPACE</header>
        <nav class="file-list" aria-label="Workspace files">
          <button class="file-row active" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h9l5 5v11H5z" /><path d="M14 4v5h5" /></svg>
            <span>README.md</span>
          </button>
          <button class="file-row" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h7l2 3h9v9H3z" /></svg>
            <span>strategies/</span>
          </button>
          <button class="file-row" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v12H4z" /><path d="M8 10h8M8 14h5" /></svg>
            <span>data/</span>
          </button>
          <button class="file-row" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 17l5-6 4 3 4-7 3 10" /></svg>
            <span>backtests/</span>
          </button>
        </nav>
      </aside>

      <section class="canvas" aria-label="Command workspace">
        <header class="editor-strip" aria-label="Editor controls">
          <div class="editor-tab">
            <span class="tab-dot" aria-hidden="true"></span>
            <span>untitled_strategy.py</span>
            <button type="button" aria-label="Close file">&times;</button>
          </div>
          <button class="run-button" type="button">Run</button>
        </header>

        <div class="editor-surface">
          <ol class="line-gutter" aria-hidden="true">
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
            <li>6</li>
            <li>7</li>
            <li>8</li>
          </ol>
          <div class="canvas-placeholder">
            <div class="mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="shortcuts" aria-label="Keyboard shortcuts">
              <div>
                <span>Toggle file tree</span>
                <kbd>Ctrl</kbd>
                <em>+</em>
                <kbd>B</kbd>
              </div>
              <div>
                <span>Toggle editor</span>
                <kbd>Ctrl</kbd>
                <em>+</em>
                <kbd>Alt</kbd>
                <em>+</em>
                <kbd>E</kbd>
              </div>
              <div>
                <span>New file</span>
                <kbd>Ctrl</kbd>
                <em>+</em>
                <kbd>Alt</kbd>
                <em>+</em>
                <kbd>N</kbd>
              </div>
              <div>
                <span>New chat</span>
                <kbd>Ctrl</kbd>
                <em>+</em>
                <kbd>Shift</kbd>
                <em>+</em>
                <kbd>L</kbd>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="chat-panel" aria-label="AI research panel">
        <header class="chat-header">
          <h1>Crypto research lab</h1>
          <div class="chat-tools" aria-label="Chat actions">
            <button class="icon-button" type="button" aria-label="New chat">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
            </button>
            <button class="icon-button" type="button" aria-label="History">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></svg>
            </button>
          </div>
        </header>

        <div class="chat-empty" aria-label="Empty chat">
          <span>No research thread yet</span>
        </div>

        <form class="composer" aria-label="AI command composer">
          <label class="sr-only" for="prompt">Command</label>
          <textarea id="prompt" rows="2" placeholder="Ask the AI to research, build, or backtest..."></textarea>
          <div class="composer-footer">
            <button class="model-button" type="button">AI&nbsp;&nbsp;Claude Opus 4.8</button>
            <div class="composer-actions">
              <button class="icon-button" type="button" aria-label="Voice input">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3" /></svg>
              </button>
              <button class="send-button" type="submit" aria-label="Send command">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7" /></svg>
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script src="./crypto-quant-workspace.js"></script>
  </body>
</html>
